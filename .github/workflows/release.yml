name: Android Release Build

on:
  release:
    types: [published, created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android Release Artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Prepare Environment Files
        run: |
          if [ ! -f .env ]; then
            if [ -f .env.example ]; then
              echo "Creating .env from .env.example..."
              cp .env.example .env
            else
              echo "Creating blank .env file..."
              touch .env
            fi
          fi

      - name: Setup Signing Key
        run: |
          if [ -n "${{ secrets.SIGNING_KEY }}" ]; then
            echo "Signing key secret found. Decoding..."
            echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > my-upload-key.jks
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "Signing key secret NOT found. Generating a temporary self-signed keystore..."
            keytool -genkey -v -keystore my-upload-key.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -storepass testpassword -keypass testpassword -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, S=Unknown, C=Unknown"
            echo "STORE_PASSWORD=testpassword" >> $GITHUB_ENV
            echo "KEY_PASSWORD=testpassword" >> $GITHUB_ENV
          fi
          echo "KEYSTORE_PATH=${{ github.workspace }}/my-upload-key.jks" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK and AAB
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ env.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: |
          gradle assembleRelease bundleRelease

      - name: Prepare Artifacts
        run: |
          mkdir -p build-artifacts
          # Find APKs and copy them
          find app/build/outputs/apk/release/ -name "*.apk" -exec cp {} build-artifacts/app-release.apk \;
          # Find AABs and copy them
          find app/build/outputs/bundle/release/ -name "*.aab" -exec cp {} build-artifacts/app-release.aab \;
          
          echo "Artifacts located in build-artifacts/:"
          ls -l build-artifacts/

      - name: Upload APK as Action Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build-artifacts/app-release.apk

      - name: Upload AAB as Action Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build-artifacts/app-release.aab

      - name: Upload Artifacts to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-artifacts/app-release.apk
            build-artifacts/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
